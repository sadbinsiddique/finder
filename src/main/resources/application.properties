spring.application.name=Finder
# ------------------------------
# DATABASE CONNECTION (MySQL)
# ------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/hb-finder
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ------------------------------
# HIBERNATE & JPA SETTINGS
# ------------------------------
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
# ------------------------------
# SPRING DATA REST
# ------------------------------
spring.data.rest.base-path=/api
spring.data.rest.default-page-size=10
# ------------------------------
# SWAGGER / OPENAPI (Docs)
# ------------------------------
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
# ------------------------------
# APPLICATION BEHAVIOR & LOGGING
# ------------------------------
# Turn On Spring Boot Banner (Fixed from 'off' to 'console')
spring.main.banner-mode=console
# Root logging level (Changed to 'info' so you can see startup success/failure)
logging.level.root=info
# Show JPA/Hibernate logging message (Trace will show exactly what parameters are bound to ? in SQL)
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.orm.jdbc.bind=trace
# Disable Thymeleaf cache for development (so HTML updates instantly on refresh)
spring.thymeleaf.cache=false