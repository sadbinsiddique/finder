spring.application.name=Finder

# -----------------------------------------------------
# DATABASE CONNECTION (MySQL 8.0+)
# -----------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/hb-finder?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------------
# HIKARI CP CONNECTION POOL (Database Stabilization)
# -----------------------------------------------------
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=FinderHikariPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=5000
spring.datasource.hikari.transaction-isolation=TRANSACTION_REPEATABLE_READ
spring.datasource.hikari.auto-commit=true

# -----------------------------------------------------
# HIBERNATE & JPA SETTINGS
# -----------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# Default Schema & Catalog
spring.jpa.properties.hibernate.default_schema=hb-finder
spring.jpa.properties.hibernate.default_catalog=hb-finder

# Fetch Size & Batching Optimization
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Transaction & Connection Handling Stability
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION

# -----------------------------------------------------
# SPRING DATA REST
# -----------------------------------------------------
spring.data.rest.base-path=/api
spring.data.rest.default-page-size=10

# -----------------------------------------------------
# SWAGGER / OPENAPI (Docs)
# -----------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true

# -----------------------------------------------------
# APPLICATION BEHAVIOR & LOGGING
# -----------------------------------------------------
spring.main.banner-mode=console
logging.level.root=info
logging.level.org.hibernate.SQL=info
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.com.zaxxer.hikari=info

# Thymeleaf Development Mode
spring.thymeleaf.cache=false