spring.application.name=Finder

# Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/finder?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
# Customize our endpoint base path
spring.data.rest.base-path=/magic-api
# Customize our page size
spring.data.rest.default-page-size=1
# /api-docs endpoint custom path
springdoc.api-docs.path=/api-docs


