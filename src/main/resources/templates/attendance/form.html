<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Record Attendance</h2>
    <hr/>

    <form class="mt-4" method="post" style="max-width: 600px;" th:action="@{/attendance/save}"
          th:object="${attendance}">

        <!-- Student Dropdown -->
        <div class="mb-3">
            <label class="form-label fw-bold">Student</label>
            <!-- Lock the dropdown if we are updating an existing record so the Composite Key doesn't change -->
            <label>
                <select class="form-select" required th:field="*{student}"
                        th:style="${attendance.id != null && attendance.id.studentId != null ? 'pointer-events: none; background-color: #e9ecef;' : ''}">
                    <option value="">-- Select Student --</option>
                    <option th:each="stu : ${students}"
                            th:text="${stu.firstName + ' ' + stu.lastName}"
                            th:value="${stu.id}"></option>
                </select>
            </label>
        </div>

        <!-- Course Dropdown -->
        <div class="mb-3">
            <label class="form-label fw-bold">Course</label>
            <label>
                <select class="form-select" required th:field="*{course}"
                        th:style="${attendance.id != null && attendance.id.courseId != null ? 'pointer-events: none; background-color: #e9ecef;' : ''}">
                    <option value="">-- Select Course --</option>
                    <option th:each="crs : ${courses}"
                            th:text="${crs.title}"
                            th:value="${crs.id}"></option>
                </select>
            </label>
        </div>

        <!-- Attendance Date (Part of Composite Key) -->
        <div class="mb-3">
            <label class="form-label fw-bold">Date</label>
            <label>
                <input class="form-control" required th:field="*{id.attendanceDate}"
                       th:readonly="${attendance.id != null && attendance.id.attendanceDate != null}"
                       type="date"/>
            </label>
        </div>

        <!-- Status Dropdown (Enum) -->
        <div class="mb-3">
            <label class="form-label fw-bold">Status</label>
            <label>
                <select class="form-select" required th:field="*{status}">
                    <option value="">-- Select Status --</option>
                    <option th:each="stat : ${statuses}"
                            th:text="${stat}"
                            th:value="${stat}"></option>
                </select>
            </label>
        </div>

        <div class="mt-4">
            <button class="btn btn-success" type="submit">Save Attendance</button>
            <a class="btn btn-secondary" th:href="@{/attendance}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
