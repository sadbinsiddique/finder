<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>System Home Page</title>

    <!-- Your compiled Tailwind CSS -->
    <link rel="stylesheet" th:href="@{/css/input.css}">
</head>

<!-- Vibrant gradient background to contrast the glass effect -->
<body class="font-sans bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-400 min-h-screen flex items-center justify-center p-6 antialiased relative overflow-hidden">

<!-- Decorative ambient background orbs to enhance the glass reflection -->
<div class="absolute top-0 left-1/4 w-96 h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-60"></div>
<div class="absolute bottom-0 right-1/4 w-96 h-96 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-60"></div>
<div class="absolute -bottom-8 left-1/3 w-72 h-72 bg-indigo-300 rounded-full mix-blend-multiply filter blur-3xl opacity-60"></div>

<!-- MAIN LIQUID GLASS CONTAINER -->
<div class="relative z-10 w-full max-w-2xl p-10 md:p-16
                bg-white/20 backdrop-blur-2xl
                border border-white/40 shadow-[0_8px_32px_0_rgba(31,38,135,0.2)]
                rounded-[2rem] flex flex-col justify-center items-center text-center">

    <!-- Glassy icon wrapper -->
    <div class="mb-6 p-4 bg-white/30 rounded-2xl shadow-inner border border-white/50 backdrop-blur-md">
        <svg class="w-10 h-10 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"
             xmlns="http://www.w3.org/2000/svg">
            <path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"
                  stroke-width="1.5"></path>
        </svg>
    </div>

    <!-- Typography -->
    <h1 class="text-4xl md:text-5xl font-semibold text-white tracking-tight drop-shadow-sm mb-4">
        System Home
    </h1>

    <p class="text-white/90 text-lg md:text-xl font-light max-w-md mb-10">
        Welcome to your digital workspace. All system components are currently operational.
    </p>

    <!-- Glassmorphic Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
        <button class="px-8 py-3.5 bg-white/30 hover:bg-white/40 text-white font-medium rounded-xl
                           transition-all duration-300 ease-in-out backdrop-blur-md border border-white/40
                           shadow-lg hover:shadow-xl hover:-translate-y-1">
            Enter Dashboard
        </button>
        <button class="px-8 py-3.5 bg-black/10 hover:bg-black/20 text-white font-medium rounded-xl
                           transition-all duration-300 ease-in-out backdrop-blur-md border border-white/20
                           shadow-lg hover:shadow-xl hover:-translate-y-1">
            System Settings
        </button>
    </div>

</div>

</body>
</html>
