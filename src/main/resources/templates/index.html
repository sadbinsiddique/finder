<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Home</title>
    <link rel="stylesheet" th:href="@{/css/input.css}">
    <link rel="icon" th:href="@{/img/favicon.ico}" type="image/x-icon"/>
</head>

<body class="font-sans bg-slate-900 text-slate-100 min-h-screen flex flex-col antialiased">

<nav class="w-full bg-white/5 backdrop-blur-xl border-b border-white/10 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="p-2">
                <img th:src="@{/img/finder.svg}">
            </div>
            <span class="text-xl font-semibold tracking-tight text-white">Finder</span>
        </div>

        <div class="hidden md:flex gap-6 text-sm font-medium text-slate-300">
            <a class="hover:text-white transition-colors" href="#">Dashboard</a>
            <a class="hover:text-white transition-colors" href="#">Users</a>
            <a class="hover:text-white transition-colors" href="#">Reports</a>
            <a class="hover:text-white transition-colors" href="#">Settings</a>
        </div>

        <div class="flex items-center gap-4">
            <button class="text-sm font-medium text-slate-300 hover:text-white transition-colors">Logout</button>
        </div>
    </div>
</nav>

<main class="flex-grow flex items-center justify-center p-6 relative">

    <div class="relative z-10 w-full max-w-2xl p-10 md:p-16
                    bg-white/5 backdrop-blur-2xl
                    border border-white/10 shadow-[0_8px_32px_0_rgba(0,0,0,0.4)]
                    rounded-[2rem] flex flex-col justify-center items-center text-center">

        <div class="mb-6 p-4 bg-white/5 rounded-2xl shadow-inner border border-white/10 backdrop-blur-md">
            <svg class="w-10 h-10 text-blue-400 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                 xmlns="http://www.w3.org/2000/svg">
                <path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                      stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="1.5"></path>
            </svg>
        </div>

        <h1 class="text-4xl md:text-5xl font-semibold text-white tracking-tight mb-4">
            Management System
        </h1>

        <p class="text-slate-400 text-lg md:text-xl font-light max-w-md mb-10">
            Welcome to digital workspace. All system components are currently operational and secure.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
            <button class="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl
                               transition-all duration-300 ease-in-out shadow-lg shadow-blue-900/50
                               hover:shadow-blue-900/80 hover:-translate-y-0.5">
                Student
            </button>

            <button class="px-8 py-3.5 bg-white/5 hover:bg-white/10 text-white font-medium rounded-xl
                               transition-all duration-300 ease-in-out backdrop-blur-md border border-white/10
                               shadow-lg hover:shadow-xl hover:-translate-y-0.5"
                    th:onclick="|window.location.href='@{/employees/list}'|">
                Employee
            </button>

            <button class="px-8 py-3.5 bg-white/5 hover:bg-white/10 text-white font-medium rounded-xl
                               transition-all duration-300 ease-in-out backdrop-blur-md border border-white/10
                               shadow-lg hover:shadow-xl hover:-translate-y-0.5"
                    th:onclick="|window.location.href='@{/staff/list}'|">
                Staff
            </button>
        </div>

    </div>
</main>

<footer class="w-full bg-slate-950/50 border-t border-white/5 py-6 mt-auto">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <p class="text-slate-500 text-sm">
            &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> Enterprise System. All
            rights reserved.
        </p>
        <div class="flex gap-4 text-sm text-slate-500">
            <a class="hover:text-slate-300 transition-colors" href="#">Privacy Policy</a>
            <a class="hover:text-slate-300 transition-colors" href="#">Terms of Service</a>
            <a class="hover:text-slate-300 transition-colors" href="#">Support</a>
        </div>
    </div>
</footer>

</body>
</html>
