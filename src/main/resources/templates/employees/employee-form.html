<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Save Employee</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h3>Employee Directory</h3>
    <hr>
    <p class="h4 mb-4">Save Employee</p>

    <form action="#" class="col-md-6" method="post" th:action="@{/employees/save}" th:object="${employee}">

        <!-- CRITICAL: This hidden field binds the ID.
             If it has a value, Spring does an UPDATE.
             If it is empty, Spring does an INSERT. -->
        <input th:field="*{id}" type="hidden"/>

        <div class="mb-3">
            <!-- Note: Make sure your Java class uses 'firstName' and not 'fastName' -->
            <label>
                <input class="form-control" placeholder="First Name" th:field="*{fastName}" type="text">
            </label>
        </div>

        <div class="mb-3">
            <label>
                <input class="form-control" placeholder="Last Name" th:field="*{lastName}" type="text">
            </label>
        </div>

        <div class="mb-4">
            <label>
                <input class="form-control" placeholder="Email" th:field="*{email}" type="text">
            </label>
        </div>

        <button class="btn btn-info w-100 text-white fw-bold" type="submit">Save</button>

    </form>

    <hr class="mt-4">
    <a class="btn btn-secondary px-4" th:href="@{/employees/list}">Back to List</a>
</div>

</body>
</html>
