<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Departments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Academic Departments</h2>
    <hr/>

    <a class="btn btn-primary mb-3" th:href="@{/departments/new}">Add New Department</a>
    <a class="btn btn-secondary mb-3" th:href="@{/}">Back to Home</a>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Department Name</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="dept : ${departments}">
            <td th:text="${dept.id}"></td>
            <td th:text="${dept.name}"></td>
            <td>
                <a class="btn btn-warning btn-sm" th:href="@{/departments/edit/{id}(id=${dept.id})}">Edit</a>
                <a class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this department?')"
                   th:href="@{/departments/delete/{id}(id=${dept.id})}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
