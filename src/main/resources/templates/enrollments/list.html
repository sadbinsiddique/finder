<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Enrollments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Course Enrollments</h2>
    <hr/>

    <a class="btn btn-primary mb-3" th:href="@{/enrollments/new}">Enroll Student</a>
    <a class="btn btn-secondary mb-3" th:href="@{/}">Back to Home</a>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>Student Name</th>
            <th>Course Name</th>
            <th>Enrollment Date</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="enrollment : ${enrollments}">
            <td th:text="${enrollment.student.firstName + ' ' + enrollment.student.lastName}"></td>
            <td th:text="${enrollment.course.title}"></td>
            <td th:text="${enrollment.enrollmentDate}"></td>
            <td>
                <!-- Pass the composite key as Request Parameters -->
                <a class="btn btn-warning btn-sm"
                   th:href="@{/enrollments/edit(studentId=${enrollment.student.id}, courseId=${enrollment.course.id})}">Edit</a>

                <a class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to drop this course for the student?')"
                   th:href="@{/enrollments/delete(studentId=${enrollment.student.id}, courseId=${enrollment.course.id})}">Drop
                    Course</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
