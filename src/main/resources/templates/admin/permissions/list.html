<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permissions - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07090e;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-inner-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            --apple-blue: #0A84FF;
            --apple-purple: #5E5CE6;
            --text-primary: #F5F5F7;
            --text-secondary: rgba(245, 245, 247, 0.55);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(94, 92, 230, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 20% 80%, rgba(10, 132, 255, 0.06) 0%, transparent 45%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .glass-navbar {
            background: rgba(7, 9, 14, 0.75);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-apple-glass {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: var(--glass-inner-shadow);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .btn-apple-glass:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        .liquid-glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35), var(--glass-inner-shadow);
            border-radius: 20px;
            padding: 1.5rem;
            overflow: hidden;
        }

        /* Strict Bootstrap Table Overrides */
        .glass-table, .glass-table tr, .glass-table td, .glass-table th {
            --bs-table-bg: transparent !important;
            --bs-table-accent-bg: transparent !important;
            --bs-table-striped-bg: transparent !important;
            --bs-table-hover-bg: rgba(255, 255, 255, 0.05) !important;
            --bs-table-color: var(--text-primary) !important;
            background-color: transparent !important;
            color: var(--text-primary) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            vertical-align: middle;
        }

        .glass-table th {
            background: rgba(255, 255, 255, 0.03) !important;
            color: var(--text-secondary) !important;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 16px;
        }

        .glass-table td {
            padding: 14px 16px;
            font-size: 0.9rem;
        }

        .glass-table tbody tr:hover td {
            background-color: rgba(255, 255, 255, 0.05) !important;
        }

        .badge-perm-key {
            background: rgba(10, 132, 255, 0.12) !important;
            border: 1px solid rgba(10, 132, 255, 0.25);
            color: #64D2FF !important;
            border-radius: 8px;
            padding: 4px 10px;
            font-family: monospace;
            font-size: 0.85rem;
            display: inline-block;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg glass-navbar py-3 mb-4">
    <div class="container">
        <a class="navbar-brand text-white fw-bold d-flex align-items-center gap-2" href="/">
            <i class="fas fa-graduation-cap" style="color: var(--apple-blue);"></i>
            <span>University ERP</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <a th:href="@{/admin}" class="btn btn-apple-glass">
                <i class="fas fa-sliders-h me-1" style="color: var(--apple-purple);"></i> Admin Panel
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-apple-glass text-danger">
                    <i class="fas fa-power-off me-1"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="mb-4">
        <h1 class="h3 fw-bold text-white mb-1">System Permissions</h1>
        <p class="text-secondary small mb-0">Fine-grained authority definition registry.</p>
    </div>

    <div class="liquid-glass-card">
        <table class="table glass-table mb-0">
            <thead>
            <tr>
                <th style="width: 80px;">ID</th>
                <th>Permission Designation</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="perm : ${permissions}">
                <td class="text-secondary fw-medium" th:text="${perm.id}">1</td>
                <td>
                    <i class="fas fa-key me-2" style="color: var(--apple-purple);"></i>
                    <span class="badge-perm-key" th:text="${perm.permissionName}">READ</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(permissions)}">
                <td colspan="2" class="text-center text-secondary py-4">
                    <i class="fas fa-inbox fa-2x mb-2 d-block opacity-50"></i>
                    No permissions defined in system
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
