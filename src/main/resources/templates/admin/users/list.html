<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .admin-navbar {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .content-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .table-dark-custom {
            --bs-table-bg: transparent;
            --bs-table-border-color: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }

        .table-dark-custom thead th {
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }

        .table-dark-custom tbody tr:hover {
            background: rgba(102, 126, 234, 0.08);
        }

        .badge-role {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .badge-enabled {
            background: rgba(25, 135, 84, 0.2);
            color: #6bffb8;
            border: 1px solid rgba(25, 135, 84, 0.3);
        }

        .badge-disabled {
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b7a;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .btn-admin {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-admin:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .section-title {
            color: #fff;
            font-weight: 700;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg admin-navbar mb-4">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/">
            <i class="fas fa-graduation-cap me-2"></i>University ERP
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-sm">
                <i class="fas fa-tachometer-alt me-1"></i>Dashboard
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                    <i class="fas fa-sign-out-alt me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="section-title mb-0">
            <i class="fas fa-users-cog me-2"></i>User Management
        </h2>
        <a th:href="@{/admin/users/new}" class="btn btn-admin btn-primary">
            <i class="fas fa-user-plus me-1"></i>Add New User
        </a>
    </div>

    <div class="content-card">
        <table class="table table-dark-custom mb-0">
            <thead>
            <tr>
                <th>Username</th>
                <th>Status</th>
                <th>Roles</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td>
                    <i class="fas fa-user-circle me-2 text-white-50"></i>
                    <strong th:text="${user.username}"></strong>
                </td>
                <td>
                    <span th:if="${user.enabled != null and user.enabled}"
                          class="badge badge-enabled">
                        <i class="fas fa-check-circle me-1"></i>Active
                    </span>
                    <span th:unless="${user.enabled != null and user.enabled}"
                          class="badge badge-disabled">
                        <i class="fas fa-times-circle me-1"></i>Disabled
                    </span>
                </td>
                <td>
                    <span th:each="role : ${user.roles}" class="badge badge-role me-1"
                          th:text="${role.roleName}">ROLE</span>
                    <span th:if="${#lists.isEmpty(user.roles)}" class="text-white-50 fst-italic">
                        No roles assigned
                    </span>
                </td>
                <td class="text-end">
                    <a th:href="@{/admin/users/edit/{u}(u=${user.username})}"
                       class="btn btn-sm btn-outline-warning me-1">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{/admin/users/delete/{u}(u=${user.username})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Are you sure you want to delete this user?')">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="4" class="text-center text-white-50 py-4">
                    <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                    No users found
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
