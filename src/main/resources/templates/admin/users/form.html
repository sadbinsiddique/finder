<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07090e;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-inner-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
            --apple-blue: #0A84FF;
            --apple-purple: #5E5CE6;
            --text-primary: #F5F5F7;
            --text-secondary: rgba(245, 245, 247, 0.55);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(94, 92, 230, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 20% 80%, rgba(10, 132, 255, 0.06) 0%, transparent 45%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .glass-navbar {
            background: rgba(7, 9, 14, 0.75);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .liquid-glass-form {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 600px;
            width: 100%;
            margin: 2rem auto;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), var(--glass-inner-shadow);
        }

        .form-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            padding: 12px 14px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.2);
            color: #fff;
        }

        .role-check-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 1rem;
        }

        .form-check-input {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .form-check-input:checked {
            background-color: var(--apple-blue);
            border-color: var(--apple-blue);
        }

        .form-check-label {
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .btn-apple-primary {
            background: var(--apple-blue);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 14px rgba(10, 132, 255, 0.35), var(--glass-inner-shadow);
            color: #fff;
            border-radius: 12px;
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .btn-apple-primary:hover {
            background: #0071e3;
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-apple-glass {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: var(--glass-inner-shadow);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .btn-apple-glass:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg glass-navbar py-3 mb-4">
    <div class="container">
        <a class="navbar-brand text-white fw-bold d-flex align-items-center gap-2" href="/">
            <i class="fas fa-graduation-cap" style="color: var(--apple-blue);"></i>
            <span>University ERP</span>
        </a>
        <div class="ms-auto">
            <a th:href="@{/admin/users}" class="btn btn-apple-glass">
                <i class="fas fa-arrow-left me-1"></i> Back to Users
            </a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="liquid-glass-form">
        <h1 class="h3 fw-bold text-white mb-1" th:text="${user.username == null or user.username == '' ? 'Create New User' : 'Edit User Account'}">User Form</h1>
        <p class="text-secondary small mb-4">Configure user credentials and security role assignments.</p>

        <form method="post" th:action="@{/admin/users/save}" th:object="${user}">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" th:field="*{username}" required
                       th:readonly="${user.username != null and user.username != ''}"
                       placeholder="Username"/>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" th:field="*{password}"
                       th:required="${user.username == null or user.username == ''}"
                       placeholder="Enter new password or leave blank to keep current"/>
                <small class="text-secondary mt-1 d-block" th:if="${user.username != null and user.username != ''}">
                    Leave blank to preserve existing password.
                </small>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="enabledCheck" th:field="*{enabled}"/>
                <label class="form-check-label ms-1" for="enabledCheck">Account Enabled</label>
            </div>

            <div class="mb-4">
                <label class="form-label">Assign System Roles</label>
                <div class="role-check-group">
                    <div th:each="role : ${allRoles}" class="form-check mb-2">
                        <input type="checkbox" class="form-check-input"
                               th:id="'role_' + ${role.id}"
                               name="roleIds"
                               th:value="${role.id}"
                               th:checked="${user.roles != null and user.roles.contains(role)}"/>
                        <label class="form-check-label ms-1" th:for="'role_' + ${role.id}" th:text="${role.roleName}">ROLE</label>
                    </div>
                </div>
            </div>

            <div class="d-flex align-items-center gap-3">
                <button type="submit" class="btn btn-apple-primary">Save User</button>
                <a th:href="@{/admin/users}" class="btn btn-apple-glass">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
