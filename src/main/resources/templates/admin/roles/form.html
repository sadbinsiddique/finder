<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Form - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .admin-navbar {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .form-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 10px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .form-label { color: rgba(255, 255, 255, 0.7); font-weight: 600; }

        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 10px 28px;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .section-title { color: #fff; font-weight: 700; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg admin-navbar mb-4">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/">
            <i class="fas fa-graduation-cap me-2"></i>University ERP
        </a>
        <div class="navbar-nav ms-auto">
            <a th:href="@{/admin/roles}" class="btn btn-outline-light btn-sm">
                <i class="fas fa-arrow-left me-1"></i>Back to Roles
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="section-title mb-4">
        <i class="fas fa-shield-alt me-2"></i>
        <span th:text="${role.id == null ? 'Create New Role' : 'Edit Role'}"></span>
    </h2>

    <div class="form-card">
        <form method="post" th:action="@{/admin/roles/save}" th:object="${role}">
            <input type="hidden" th:field="*{id}"/>

            <div class="mb-4">
                <label class="form-label">Role Name</label>
                <input type="text" class="form-control" th:field="*{roleName}" required
                       placeholder="e.g., ROLE_ADMIN"/>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-save btn-primary">
                    <i class="fas fa-save me-1"></i>Save Role
                </button>
                <a th:href="@{/admin/roles}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
