<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .admin-navbar {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .content-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .table-dark-custom {
            --bs-table-bg: transparent;
            --bs-table-border-color: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }

        .table-dark-custom thead th {
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }

        .table-dark-custom tbody tr:hover {
            background: rgba(102, 126, 234, 0.08);
        }

        .btn-admin {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-admin:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .section-title { color: #fff; font-weight: 700; }

        .badge-permission {
            background: rgba(102, 126, 234, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(102, 126, 234, 0.3);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg admin-navbar mb-4">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/">
            <i class="fas fa-graduation-cap me-2"></i>University ERP
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-sm">
                <i class="fas fa-tachometer-alt me-1"></i>Dashboard
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                    <i class="fas fa-sign-out-alt me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="section-title mb-0">
            <i class="fas fa-shield-alt me-2"></i>Role Management
        </h2>
        <a th:href="@{/admin/roles/new}" class="btn btn-admin btn-primary">
            <i class="fas fa-plus me-1"></i>Add New Role
        </a>
    </div>

    <div class="content-card">
        <table class="table table-dark-custom mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>Role Name</th>
                <th>Permissions</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="role : ${roles}">
                <td th:text="${role.id}"></td>
                <td>
                    <i class="fas fa-user-shield me-2 text-white-50"></i>
                    <strong th:text="${role.roleName}"></strong>
                </td>
                <td>
                    <span th:each="perm : ${role.permissions}" class="badge badge-permission me-1"
                          th:text="${perm.permissionName}">PERM</span>
                    <span th:if="${role.permissions == null or #lists.isEmpty(role.permissions)}"
                          class="text-white-50 fst-italic">None</span>
                </td>
                <td class="text-end">
                    <a th:href="@{/admin/roles/edit/{id}(id=${role.id})}"
                       class="btn btn-sm btn-outline-warning me-1">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{/admin/roles/delete/{id}(id=${role.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Are you sure you want to delete this role?')">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
