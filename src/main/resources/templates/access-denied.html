<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - University ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07090e;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-inner-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            --apple-red: #FF453A;
            --apple-blue: #0A84FF;
            --text-primary: #F5F5F7;
            --text-secondary: rgba(245, 245, 247, 0.55);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(255, 69, 58, 0.06) 0%, transparent 55%),
                radial-gradient(circle at 20% 80%, rgba(10, 132, 255, 0.05) 0%, transparent 45%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .liquid-glass-denied {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3.5rem 2.5rem;
            text-align: center;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), var(--glass-inner-shadow);
        }

        .icon-badge-denied {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.25);
            box-shadow: var(--glass-inner-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: var(--apple-red);
        }

        .error-code {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #FF6B60;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .denied-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #F5F5F7;
            margin-bottom: 0.75rem;
        }

        .denied-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn-apple-primary {
            background: var(--apple-blue);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 16px rgba(10, 132, 255, 0.35), var(--glass-inner-shadow);
            color: #fff;
            border-radius: 12px;
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-apple-primary:hover {
            background: #0071e3;
            color: #fff;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="liquid-glass-denied">
    <div class="icon-badge-denied">
        <i class="fas fa-shield-alt"></i>
    </div>
    <div class="error-code">403</div>
    <h1 class="denied-title">Access Restricted</h1>
    <p class="denied-text">You do not have the required role permissions to perform this action or view this resource.</p>
    <a th:href="@{/}" class="btn-apple-primary">
        <i class="fas fa-arrow-left me-2"></i>Return to Dashboard
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
