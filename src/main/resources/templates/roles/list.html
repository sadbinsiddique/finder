<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>System Roles</h2>
    <hr/>

    <a class="btn btn-primary mb-3" th:href="@{/roles/new}">Add New Role</a>
    <a class="btn btn-secondary mb-3" th:href="@{/}">Back to Home</a>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Role Name</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="role : ${roles}">
            <td th:text="${role.id}"></td>
            <td th:text="${role.roleName}"></td>
            <td>
                <a class="btn btn-warning btn-sm" th:href="@{/roles/edit/{id}(id=${role.id})}">Edit</a>
                <a class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this role?')"
                   th:href="@{/roles/delete/{id}(id=${role.id})}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
