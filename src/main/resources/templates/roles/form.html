<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Role Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${role.id == null ? 'Create New Role' : 'Update Role'}"></h2>
    <hr/>

    <form class="mt-4" method="post" style="max-width: 500px;" th:action="@{/roles/save}" th:object="${role}">

        <!-- Hidden field to retain the ID for updates -->
        <input th:field="*{id}" type="hidden"/>

        <div class="mb-3">
            <label class="form-label fw-bold">Role Name</label>
            <input class="form-control" placeholder="e.g., ROLE_ADMIN, ROLE_USER" required th:field="*{roleName}"
                   type="text"/>
        </div>

        <div class="mt-4">
            <button class="btn btn-success" type="submit">Save Role</button>
            <a class="btn btn-secondary" th:href="@{/roles}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
