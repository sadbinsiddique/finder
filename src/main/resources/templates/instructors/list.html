<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Instructors Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Instructors Directory</h2>
    <hr/>

    <a class="btn btn-primary mb-3" th:href="@{/instructors/new}">Add New Instructor</a>
    <a class="btn btn-secondary mb-3" th:href="@{/}">Back to Home</a>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="instructor : ${instructors}">
            <td th:text="${instructor.id}"></td>
            <td th:text="${instructor.firstName}"></td>
            <td th:text="${instructor.lastName}"></td>
            <td th:text="${instructor.email}"></td>
            <td>
                <a class="btn btn-warning btn-sm" th:href="@{/instructors/edit/{id}(id=${instructor.id})}">Edit</a>
                <a class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this instructor?')"
                   th:href="@{/instructors/delete/{id}(id=${instructor.id})}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
