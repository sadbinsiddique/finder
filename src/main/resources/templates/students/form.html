<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${student.id == null ? 'Register New Student' : 'Update Student Details'}"></h2>
    <hr/>

    <form class="mt-4" method="post" style="max-width: 600px;" th:action="@{/students/save}" th:object="${student}">

        <!-- Hidden field to retain the ID for updates -->
        <input th:field="*{id}" type="hidden"/>

        <div class="mb-3">
            <label class="form-label fw-bold">First Name</label>
            <input class="form-control" placeholder="Enter first name" required th:field="*{firstName}" type="text"/>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Last Name</label>
            <input class="form-control" placeholder="Enter last name" required th:field="*{lastName}" type="text"/>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <input class="form-control" placeholder="student@example.com" required th:field="*{email}" type="email"/>
        </div>

        <!-- Dropdown bound to the Department entity -->
        <div class="mb-3">
            <label class="form-label fw-bold">Department</label>
            <select class="form-select" th:field="*{department}">
                <option value="">-- Select a Department --</option>
                <!-- Loop through the departments passed from the controller -->
                <option th:each="dept : ${departments}"
                        th:text="${dept.name}"
                        th:value="${dept.id}">
                </option>
            </select>
        </div>

        <div class="mt-4">
            <button class="btn btn-success" type="submit">Save Student</button>
            <a class="btn btn-secondary" th:href="@{/students}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
