<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - University ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .login-card h2 {
            color: #fff;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-card p.lead {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .login-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.8rem;
            color: #fff;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .form-floating .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            height: 56px;
        }

        .form-floating .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .form-floating label {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .alert-custom-error {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b7a;
            border-radius: 12px;
        }

        .alert-custom-success {
            background: rgba(25, 135, 84, 0.15);
            border: 1px solid rgba(25, 135, 84, 0.3);
            color: #6bffb8;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-icon">
        <i class="fas fa-graduation-cap"></i>
    </div>
    <h2 class="text-center">Welcome Back</h2>
    <p class="lead text-center mb-4">Sign in to University ERP System</p>

    <!-- Error message -->
    <div th:if="${param.error}" class="alert alert-custom-error text-center mb-3">
        <i class="fas fa-exclamation-triangle me-2"></i>
        Invalid username or password. Please try again.
    </div>

    <!-- Logout message -->
    <div th:if="${param.logout}" class="alert alert-custom-success text-center mb-3">
        <i class="fas fa-check-circle me-2"></i>
        You have been successfully logged out.
    </div>

    <form th:action="@{/authenticateTheUser}" method="post">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Username" required autofocus>
            <label for="username"><i class="fas fa-user me-2"></i>Username</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Password" required>
            <label for="password"><i class="fas fa-lock me-2"></i>Password</label>
        </div>

        <button type="submit" class="btn btn-login btn-primary w-100">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
