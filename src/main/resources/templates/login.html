<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - University ERP</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%2330D158' d='M512 256C512 397.4 397.4 512 256 512C114.6 512 0 397.4 0 256C0 114.6 114.6 0 256 0C397.4 0 512 114.6 512 256zM256 48C141.1 48 48 141.1 48 256C48 285.2 54.02 313.1 64.9 338.3C77.46 322.9 96.79 313.3 118.2 313.3H144C161.7 313.3 176 298.1 176 281.3V256C176 238.3 190.3 224 208 224H256C273.7 224 288 209.7 288 192V160C288 142.3 302.3 128 320 128H336C344.8 128 352 120.8 352 112V92.29C322.7 64.08 283.4 48 256 48z'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07090e;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-inner-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
            --apple-blue: #0A84FF;
            --apple-purple: #5E5CE6;
            --apple-green: #30D158;
            --text-primary: #F5F5F7;
            --text-secondary: rgba(245, 245, 247, 0.55);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 20%, rgba(48, 209, 88, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 20% 80%, rgba(10, 132, 255, 0.06) 0%, transparent 45%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), var(--glass-inner-shadow);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
        }

        .logo-glow {
            color: var(--apple-green);
            filter: drop-shadow(0 0 14px rgba(48, 209, 88, 0.8));
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: rgba(48, 209, 88, 0.1);
            border: 1px solid rgba(48, 209, 88, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .form-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            padding: 12px 14px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.2);
            color: #fff;
        }

        .btn-apple-primary {
            background: var(--apple-blue);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 14px rgba(10, 132, 255, 0.35), var(--glass-inner-shadow);
            color: #fff;
            border-radius: 12px;
            padding: 12px;
            font-weight: 500;
            width: 100%;
            transition: all 0.25s ease;
        }

        .btn-apple-primary:hover {
            background: #0071e3;
            color: #fff;
            transform: translateY(-1px);
        }

        .alert-glass-danger {
            background: rgba(255, 69, 58, 0.12);
            border: 1px solid rgba(255, 69, 58, 0.25);
            color: #FF6B60;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="brand-icon">
        <i class="fas fa-globe logo-glow fs-2"></i>
    </div>
    <h1 class="h3 fw-bold text-white mb-1">University ERP</h1>
    <p class="text-secondary small mb-4">Enter your system credentials to sign in.</p>

    <div th:if="${param.error}" class="alert alert-glass-danger mb-3" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i> Invalid username or password. Please try again.
    </div>

    <div th:if="${param.logout}" class="alert alert-info text-white bg-transparent border-info mb-3 small py-2" role="alert">
        <i class="fas fa-check-circle me-1"></i> You have been logged out successfully.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3 text-start">
            <label for="usernameInput" class="form-label">Username</label>
            <input id="usernameInput" type="text" name="username" class="form-control" placeholder="e.g. admin" required autofocus/>
        </div>

        <div class="mb-4 text-start">
            <label for="passwordInput" class="form-label">Password</label>
            <input id="passwordInput" type="password" name="password" class="form-control" placeholder="Password" required/>
        </div>

        <button type="submit" class="btn btn-apple-primary">Sign In</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
