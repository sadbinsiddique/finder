<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - University ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07090e;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-inner-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
            --apple-blue: #0A84FF;
            --text-primary: #F5F5F7;
            --text-secondary: rgba(245, 245, 247, 0.55);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(10, 132, 255, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 20% 80%, rgba(94, 92, 230, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .liquid-glass-login {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), var(--glass-inner-shadow);
        }

        .login-icon-badge {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: var(--glass-inner-shadow);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.5rem;
            color: var(--apple-blue);
        }

        .login-title {
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: #F5F5F7;
            text-align: center;
            margin-bottom: 0.25rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-floating .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            height: 56px;
            font-size: 0.95rem;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .form-floating .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.2);
            color: #fff;
        }

        .form-floating label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .btn-apple-primary {
            background: var(--apple-blue);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(10, 132, 255, 0.35), var(--glass-inner-shadow);
            border-radius: 14px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            width: 100%;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-apple-primary:hover {
            background: #0071e3;
            transform: translateY(-1px);
            box-shadow: 0 12px 28px rgba(10, 132, 255, 0.45);
        }

        .alert-apple-error {
            background: rgba(255, 69, 58, 0.12);
            border: 1px solid rgba(255, 69, 58, 0.25);
            color: #FF6B60;
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 10px 14px;
        }

        .alert-apple-success {
            background: rgba(48, 209, 88, 0.12);
            border: 1px solid rgba(48, 209, 88, 0.25);
            color: #58D67D;
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 10px 14px;
        }
    </style>
</head>
<body>

<div class="liquid-glass-login">
    <div class="login-icon-badge">
        <i class="fas fa-graduation-cap"></i>
    </div>
    <h1 class="login-title">Welcome Back</h1>
    <p class="login-subtitle">Sign in to University ERP Portal</p>

    <!-- Error message -->
    <div th:if="${param.error}" class="alert alert-apple-error text-center mb-3">
        <i class="fas fa-exclamation-circle me-2"></i>Invalid username or password.
    </div>

    <!-- Logout message -->
    <div th:if="${param.logout}" class="alert alert-apple-success text-center mb-3">
        <i class="fas fa-check-circle me-2"></i>You have been logged out.
    </div>

    <form th:action="@{/authenticateTheUser}" method="post">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Username" required autofocus>
            <label for="username"><i class="fas fa-user me-2"></i>Username</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Password" required>
            <label for="password"><i class="fas fa-lock me-2"></i>Password</label>
        </div>

        <button type="submit" class="btn btn-apple-primary">
            Sign In
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
