<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${user.username == null or user.username == '' ? 'Create New User' : 'Update User'}"></h2>
    <hr/>

    <form class="mt-4" method="post" style="max-width: 500px;" th:action="@{/users/save}" th:object="${user}">

        <div class="mb-3">
            <label class="form-label fw-bold">Username</label>
            <!-- Make username readonly if we are editing an existing user so the Primary Key doesn't change -->
            <input class="form-control" required th:field="*{username}"
                   th:readonly="${user.username != null and user.username != ''}" type="text"/>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input class="form-control" required th:field="*{password}" type="password"/>
        </div>

        <div class="mb-3 form-check">
            <input class="form-check-input" id="enabledCheck" th:field="*{enabled}" type="checkbox"/>
            <label class="form-check-label fw-bold" for="enabledCheck">Account Enabled</label>
        </div>

        <div class="mt-4">
            <button class="btn btn-success" type="submit">Save User</button>
            <a class="btn btn-secondary" th:href="@{/users}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
