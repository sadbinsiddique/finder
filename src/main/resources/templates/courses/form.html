<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${course.id == null ? 'Create New Course' : 'Update Course'}"></h2>
    <hr/>

    <form class="mt-4" method="post" style="max-width: 500px;" th:action="@{/courses/save}" th:object="${course}">

        <!-- Hidden field to retain the ID for updates -->
        <input th:field="*{id}" type="hidden"/>

        <div class="mb-3">
            <label class="form-label fw-bold">Course Title</label>
            <input class="form-control" placeholder="e.g., Introduction to Computer Science" required
                   th:field="*{title}"
                   type="text"/>
        </div>

        <div class="mt-4">
            <button class="btn btn-success" type="submit">Save Course</button>
            <a class="btn btn-secondary" th:href="@{/courses}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
