<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grade book Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Record Grade</h2>
    <hr/>

    <form class="mt-4" method="post" style="max-width: 600px;" th:action="@{/gradebooks/save}" th:object="${gradebook}">

        <!-- Student Dropdown -->
        <div class="mb-3">
            <label class="form-label fw-bold">Student</label>
            <!-- Add a CSS pointer-events blocker if editing, so PK doesn't change -->
            <label>
                <select class="form-select" required th:field="*{student}"
                        th:style="${gradebook.id != null && gradebook.id.studentId != null ? 'pointer-events: none; background-color: #e9ecef;' : ''}">
                    <option value="">-- Select Student --</option>
                    <option th:each="stu : ${students}"
                            th:text="${stu.firstName + ' ' + stu.lastName}"
                            th:value="${stu.id}"></option>
                </select>
            </label>
        </div>

        <!-- Course Dropdown -->
        <div class="mb-3">
            <label class="form-label fw-bold">Course</label>
            <label>
                <select class="form-select" required th:field="*{course}"
                        th:style="${gradebook.id != null && gradebook.id.courseId != null ? 'pointer-events: none; background-color: #e9ecef;' : ''}">
                    <option value="">-- Select Course --</option>
                    <option th:each="crs : ${courses}"
                            th:text="${crs.title}"
                            th:value="${crs.id}"></option>
                </select>
            </label>
        </div>

        <!-- Assignment Name (Part of the Composite ID) -->
        <div class="mb-3">
            <label class="form-label fw-bold">Assignment Name</label>
            <!-- Bind to the EmbeddedId field -->
            <label>
                <input class="form-control" placeholder="e.g., Midterm Exam" required
                       th:field="*{id.assignmentName}"
                       th:readonly="${gradebook.id != null && gradebook.id.assignmentName != null}"
                       type="text"/>
            </label>
        </div>

        <!-- Score -->
        <div class="mb-3">
            <label class="form-label fw-bold">Score</label>
            <label>
                <input class="form-control" placeholder="0.00" required step="0.01" th:field="*{score}" type="number"/>
            </label>
        </div>

        <div class="mt-4">
            <button class="btn btn-success" type="submit">Save Grade</button>
            <a class="btn btn-secondary" th:href="@{/gradebooks}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
